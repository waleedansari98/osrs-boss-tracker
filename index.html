<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Log</title>
<style>
  :root{
    --bg-deep:#1c1712;
    --bg-panel:#2a2118;
    --bg-card:#382c1f;
    --stone-line: rgba(201,162,75,0.14);
    --gold:#c9a24b;
    --gold-bright:#f0cf7a;
    --parchment:#e8dcbe;
    --text-dim:#a89878;
    --apprentice:#5f8a52;
    --adept:#3f7f96;
    --expert:#c17a2f;
    --master:#a13a3a;
    --grandmaster:#7a4bb0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, #2b2318 0%, var(--bg-deep) 60%);
    color:var(--parchment);
    font-family: Georgia, 'Iowan Old Style', serif;
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .wrap{max-width:1100px;margin:0 auto;}

  /* Header */
  header{
    text-align:center;
    margin-bottom:22px;
    position:relative;
  }
  .eyebrow{
    font-family: Georgia, serif;
    letter-spacing:0.35em;
    font-size:11px;
    color:var(--gold);
    text-transform:uppercase;
    opacity:0.75;
    margin-bottom:6px;
  }
  h1{
    font-family: 'Trebuchet MS', Georgia, serif;
    font-weight:800;
    font-size:clamp(28px,5vw,42px);
    letter-spacing:0.04em;
    margin:0 0 4px;
    text-transform:uppercase;
    background:linear-gradient(180deg,var(--gold-bright) 0%, var(--gold) 55%, #8a6a28 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 2px 0 rgba(0,0,0,0.5);
  }
  .subtitle{color:var(--text-dim); font-size:13px; letter-spacing:0.02em;}

  /* Overall dial */
  .overall{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:28px;
    margin:22px auto 30px;
    flex-wrap:wrap;
  }
  .dial{
    width:118px;height:118px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    position:relative;
    background: conic-gradient(var(--gold) calc(var(--pct,0)*1%), rgba(255,255,255,0.06) 0);
    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.4), 0 0 22px rgba(201,162,75,0.15);
  }
  .dial::before{
    content:"";
    position:absolute; inset:9px;
    background:var(--bg-deep);
    border-radius:50%;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
  }
  .dial span{
    position:relative; z-index:1;
    font-size:24px; font-weight:700; color:var(--gold-bright);
    font-family:'Trebuchet MS',sans-serif;
  }
  .overall-stats{text-align:left; min-width:180px;}
  .overall-stats .stat-row{
    display:flex; justify-content:space-between; gap:18px;
    font-size:13.5px; color:var(--text-dim);
    padding:3px 0; border-bottom:1px dashed var(--stone-line);
    min-width:200px;
  }
  .overall-stats .stat-row b{color:var(--parchment); font-weight:700;}

  /* Controls */
  .controls{
    display:flex; gap:10px; justify-content:center; align-items:center;
    margin-bottom:26px; flex-wrap:wrap;
  }
  .search{
    background:var(--bg-panel);
    border:1px solid var(--stone-line);
    color:var(--parchment);
    padding:9px 14px;
    border-radius:6px;
    font-family:inherit;
    font-size:13.5px;
    width:220px;
    outline:none;
  }
  .search:focus{border-color:var(--gold);}
  .btn{
    background:var(--bg-panel);
    border:1px solid var(--stone-line);
    color:var(--text-dim);
    padding:9px 14px;
    border-radius:6px;
    font-family:inherit;
    font-size:13px;
    cursor:pointer;
    transition:all .15s;
  }
  .btn:hover{border-color:var(--gold); color:var(--gold-bright);}

  /* Tier sections */
  .tier{
    margin-bottom:26px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent 60%);
    border:1px solid var(--stone-line);
    border-radius:10px;
    padding:16px 16px 20px;
  }
  .tier-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:14px; flex-wrap:wrap; gap:8px;
    border-bottom:1px solid var(--stone-line);
    padding-bottom:10px;
  }
  .tier-name{
    font-family:'Trebuchet MS',sans-serif;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-size:17px;
  }
  .tier-req{font-size:11.5px; color:var(--text-dim); letter-spacing:0.03em; margin-left:10px;}
  .tier-progress-text{font-size:12.5px; color:var(--text-dim); font-family:'Trebuchet MS',sans-serif;}
  .tier-bar-track{
    width:100%; height:5px; border-radius:3px; background:rgba(255,255,255,0.06);
    margin-bottom:16px; overflow:hidden;
  }
  .tier-bar-fill{height:100%; border-radius:3px; transition:width .3s;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(108px,1fr));
    gap:10px;
  }

  .card{
    background:var(--bg-card);
    border:1px solid rgba(0,0,0,0.4);
    border-radius:8px;
    padding:10px 8px 8px;
    text-align:center;
    cursor:pointer;
    user-select:none;
    position:relative;
    transition:transform .12s, box-shadow .12s, border-color .12s;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .card:hover{transform:translateY(-2px); border-color:var(--gold);}
  .card.done{box-shadow: 0 0 0 1px var(--tier-color, var(--gold)) inset, 0 0 14px rgba(201,162,75,0.18);}

  .emblem{
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Trebuchet MS',sans-serif;
    font-weight:800; font-size:15px;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.12), rgba(0,0,0,0.35));
    border:2px solid rgba(255,255,255,0.08);
    color:var(--text-dim);
    transition:all .15s;
  }
  .card.done .emblem{
    border-color:var(--tier-color, var(--gold));
    color:var(--gold-bright);
    background:radial-gradient(circle at 35% 30%, rgba(240,207,122,0.25), rgba(0,0,0,0.4));
  }
  .card .name{
    font-size:11.5px; line-height:1.2;
    color:var(--text-dim);
    min-height:27px;
    display:flex; align-items:center; justify-content:center;
  }
  .card.done .name{color:var(--parchment);}

  .kc-row{
    display:flex; align-items:center; justify-content:center; gap:6px;
    font-family:'Trebuchet MS',sans-serif;
  }
  .kc-btn{
    width:20px;height:20px;border-radius:4px;
    border:1px solid var(--stone-line);
    background:rgba(255,255,255,0.03);
    color:var(--text-dim);
    font-size:13px; line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .kc-btn:hover{border-color:var(--gold); color:var(--gold-bright);}
  .kc-input{
    width:44px;
    text-align:center;
    font-size:13px; font-weight:700;
    font-family:'Trebuchet MS',sans-serif;
    color:var(--gold-bright);
    background:rgba(255,255,255,0.04);
    border:1px solid var(--stone-line);
    border-radius:4px;
    padding:2px 0;
    -moz-appearance:textfield;
  }
  .kc-input::-webkit-outer-spin-button,
  .kc-input::-webkit-inner-spin-button{
    -webkit-appearance:none; margin:0;
  }
  .kc-input:focus{outline:none; border-color:var(--gold);}
  .card:not(.done) .kc-input{color:var(--text-dim);}
  .kc-goal-suffix{font-size:10.5px; color:var(--text-dim); font-family:'Trebuchet MS',sans-serif;}

  .card-bar-track{
    width:100%; height:3px; border-radius:2px;
    background:rgba(255,255,255,0.08);
    overflow:hidden; margin-top:2px;
  }
  .card-bar-fill{height:100%; transition:width .2s;}

  .check{
    position:absolute; top:6px; right:6px;
    font-size:11px; color:var(--tier-color,var(--gold));
    opacity:0; transition:opacity .15s;
  }
  .card.done .check{opacity:1;}

  footer{
    text-align:center; margin-top:20px; color:var(--text-dim); font-size:11.5px;
  }
  .hidden{display:none !important;}

  @media (max-width:480px){
    .grid{grid-template-columns:repeat(auto-fill, minmax(88px,1fr));}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Personal Progress Log</div>
    <h1>Boss Log</h1>
    <div class="subtitle">Track your OSRS boss kill counts, tier by tier.</div>
  </header>

  <div class="overall">
    <div class="dial" id="overallDial"><span id="overallPct">0%</span></div>
    <div class="overall-stats">
      <div class="stat-row"><span>Goals reached</span><b id="statStarted">0 / 0</b></div>
      <div class="stat-row"><span>Total kill count</span><b id="statKC">0</b></div>
      <div class="stat-row"><span>Tiers completed</span><b id="statTiers">0 / 0</b></div>
    </div>
  </div>

  <div class="controls">
    <input class="search" id="search" type="text" placeholder="Search a boss...">
    <button class="btn" id="resetBtn">Reset all progress</button>
  </div>

  <div id="tiers"></div>

  <footer>Type a kill count into any box to update it · progress saves automatically</footer>
</div>

<script>
const TIERS = [
  {
    key:'apprentice', name:'Apprentice', color:'var(--apprentice)', req:'Entry-level bosses', goal:25,
    bosses:['Giant Mole','Bryophyta','Obor','Crazy Archaeologist','Chaos Fanatic','King Black Dragon','Kalphite Queen','Chaos Elemental','Scorpia','Tempoross','Wintertodt','Zalcano']
  },
  {
    key:'adept', name:'Adept', color:'var(--adept)', req:'75+ combat recommended', goal:50,
    bosses:["Vet'ion",'Venenatis','Callisto','Barrows Chests','Deranged Archaeologist','Skotizo','Thermonuclear Smoke Devil','Sarachnis','Grotesque Guardians','Kree\'arra']
  },
  {
    key:'expert', name:'Expert', color:'var(--expert)', req:'Solo boss mechanics', goal:75,
    bosses:['Zulrah','Vorkath','Cerberus','Alchemical Hydra','Crystalline Hunllef','Corrupted Hunllef','Nightmare of Ashihama','Phantom Muspah','Duke Sucellus','The Leviathan','The Whisperer','Vardorvis','Dagannoth Rex','Dagannoth Prime','Dagannoth Supreme']
  },
  {
    key:'master', name:'Master', color:'var(--master)', req:'Group content & raids', goal:100,
    bosses:['General Graardor','Kril Tsutsaroth','Commander Zilyana','Corporeal Beast','Nex','Chambers of Xeric','Theatre of Blood','Tombs of Amascut','The Nightmare','Phosani\'s Nightmare']
  },
  {
    key:'grandmaster', name:'Grandmaster', color:'var(--grandmaster)', req:'The hardest content in the game', goal:10,
    bosses:['TzTok-Jad (Fight Caves)','TzKal-Zuk (Inferno)','Sol Heredit (Colosseum)','Theatre of Blood: Hard Mode','Tombs of Amascut: Expert Mode','Chambers of Xeric: Challenge Mode']
  }
];

let state = {}; // { "tierkey|bossname": count }

function slug(tierKey, boss){
  return tierKey + '|' + boss;
}
function initials(name){
  const clean = name.replace(/[():]/g,'').split(' ').filter(Boolean);
  if(clean.length===1) return clean[0].slice(0,2).toUpperCase();
  return (clean[0][0] + clean[1][0]).toUpperCase();
}

function loadState(){
  try{
    const saved = localStorage.getItem('boss-log-state');
    if(saved){
      state = JSON.parse(saved);
    }
  }catch(e){
    state = {};
  }
}
function saveState(){
  try{
    localStorage.setItem('boss-log-state', JSON.stringify(state));
  }catch(e){
    console.error('save failed', e);
  }
}

function getCount(tierKey, boss){
  return state[slug(tierKey,boss)] || 0;
}
function setCount(tierKey, boss, val){
  const v = Math.max(0, val);
  if(v === 0) delete state[slug(tierKey,boss)];
  else state[slug(tierKey,boss)] = v;
}

function render(){
  const container = document.getElementById('tiers');
  container.innerHTML = '';

  let totalBosses = 0, startedBosses = 0, totalKC = 0, tiersComplete = 0;

  TIERS.forEach(tier => {
    const section = document.createElement('div');
    section.className = 'tier';
    section.style.setProperty('--tier-color', tier.color);

    const goal = tier.goal;
    const completeInTier = tier.bosses.filter(b => getCount(tier.key,b) >= goal).length;
    const pctTier = Math.round((completeInTier / tier.bosses.length) * 100);
    if(completeInTier === tier.bosses.length) tiersComplete++;

    totalBosses += tier.bosses.length;
    startedBosses += completeInTier;

    section.innerHTML = `
      <div class="tier-head">
        <div>
          <span class="tier-name" style="color:${tier.color}">${tier.name}</span>
          <span class="tier-req">${tier.req} &middot; goal: ${goal} kc each</span>
        </div>
        <div class="tier-progress-text">${completeInTier} / ${tier.bosses.length} at goal &nbsp;·&nbsp; ${pctTier}%</div>
      </div>
      <div class="tier-bar-track"><div class="tier-bar-fill" style="width:${pctTier}%; background:${tier.color};"></div></div>
      <div class="grid" data-tier="${tier.key}"></div>
    `;
    container.appendChild(section);

    const grid = section.querySelector('.grid');
    tier.bosses.forEach(boss => {
      const count = getCount(tier.key, boss);
      totalKC += count;
      const reached = count >= goal;
      const cardPct = Math.min(100, Math.round((count/goal)*100));
      const card = document.createElement('div');
      card.className = 'card' + (reached ? ' done' : '');
      card.style.setProperty('--tier-color', tier.color);
      card.dataset.boss = boss.toLowerCase();
      card.innerHTML = `
        <div class="check">✓</div>
        <div class="emblem">${initials(boss)}</div>
        <div class="name">${boss}</div>
        <div class="kc-row">
          <input class="kc-input" type="number" min="0" inputmode="numeric" value="${count}">
          <span class="kc-goal-suffix">/ ${goal}</span>
        </div>
        <div class="card-bar-track"><div class="card-bar-fill" style="width:${cardPct}%; background:${tier.color};"></div></div>
      `;
      const input = card.querySelector('.kc-input');
      input.addEventListener('click', (e) => e.stopPropagation());
      input.addEventListener('change', () => {
        let v = parseInt(input.value, 10);
        if(isNaN(v) || v < 0) v = 0;
        setCount(tier.key, boss, v);
        saveState();
        render();
        applySearch();
      });
      input.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') input.blur();
      });
      grid.appendChild(card);
    });
  });

  const overallPct = totalBosses ? Math.round((startedBosses/totalBosses)*100) : 0;
  document.getElementById('overallDial').style.setProperty('--pct', overallPct);
  document.getElementById('overallPct').textContent = overallPct + '%';
  document.getElementById('statStarted').textContent = `${startedBosses} / ${totalBosses}`;
  document.getElementById('statKC').textContent = totalKC.toLocaleString();
  document.getElementById('statTiers').textContent = `${tiersComplete} / ${TIERS.length}`;
}

function applySearch(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('hidden', !!q && !card.dataset.boss.includes(q));
  });
  document.querySelectorAll('.tier').forEach(section => {
    const anyVisible = [...section.querySelectorAll('.card')].some(c => !c.classList.contains('hidden'));
    section.classList.toggle('hidden', !!q && !anyVisible);
  });
}

document.getElementById('search').addEventListener('input', applySearch);
document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm('Reset all boss kill progress? This cannot be undone.')){
    state = {};
    saveState();
    render();
  }
});

(function init(){
  loadState();
  render();
})();
</script>
</body>
</html>
